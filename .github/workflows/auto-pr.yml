# Open or update a pull request when feature/refactor branches are pushed.
#
# Base branch rules (no per-branch config file):
#   feature/*                         -> master
#   refactor/* (generic)              -> master
#   refactor/client-pr{N}-*  (N > 1)  -> first remote branch matching refactor/client-pr{N-1}-*
#   refactor/client-pr1-*             -> master
#
# Override: include [pr-base=branch-name] in the latest commit message.
name: Auto PR

on:
  push:
    branches:
      - "feature/**"
      - "refactor/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve base branch and title
        id: meta
        uses: actions/github-script@v7
        env:
          HEAD_BRANCH: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        with:
          script: |
            const head = process.env.HEAD_BRANCH;
            const commitMessage = process.env.COMMIT_MESSAGE || "";

            function titleFromBranch(branch) {
              const slug = branch.split("/").pop() || branch;
              return slug
                .split("-")
                .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
                .join(" ");
            }

            function overrideBase(message) {
              const match = message.match(/\[pr-base=([^\]\s]+)\]/);
              return match ? match[1] : null;
            }

            async function resolveStackBase(branch) {
              const match = branch.match(/^refactor\/client-pr(\d+)-/);
              if (!match) {
                return "master";
              }

              const n = Number(match[1]);
              if (n <= 1) {
                return "master";
              }

              const prevPrefix = `refactor/client-pr${n - 1}-`;
              const branches = [];
              let page = 1;

              while (true) {
                const { data } = await github.rest.repos.listBranches({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 100,
                  page,
                });
                branches.push(...data.map((item) => item.name));
                if (data.length < 100) {
                  break;
                }
                page += 1;
              }

              const parent = branches.find((name) => name.startsWith(prevPrefix));
              return parent || "master";
            }

            const override = overrideBase(commitMessage);
            const base = override || (await resolveStackBase(head));
            const title = titleFromBranch(head);

            if (head === base) {
              core.setFailed(`Head and base are both ${head}; refusing to open a PR.`);
              return;
            }

            core.setOutput("base", base);
            core.setOutput("title", title);

      - name: Create or update pull request
        uses: actions/github-script@v7
        with:
          script: |
            const head = context.ref.replace("refs/heads/", "");
            const base = `${{ steps.meta.outputs.base }}`;
            const title = `${{ steps.meta.outputs.title }}`;

            const body = [
              "Auto-opened by [.github/workflows/auto-pr.yml](.github/workflows/auto-pr.yml).",
              "",
              `- **Head:** \`${head}\``,
              `- **Base:** \`${base}\``,
              "",
              "Re-run by pushing again (e.g. `git commit --allow-empty -m \"trigger auto-pr\" && git push`).",
              "Override base branch with `[pr-base=your-base-branch]` in a commit message.",
            ].join("\n");

            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${head}`,
              state: "open",
            });

            if (existing.length > 0) {
              const pull = existing[0];
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pull.number,
                base,
                title,
                body,
              });
              core.info(`Updated PR #${pull.number}: ${head} -> ${base}`);
              return;
            }

            const { data: created } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head,
              base,
              title,
              body,
            });
            core.info(`Created PR #${created.number}: ${head} -> ${base}`);
