name: Release

on:
  push:
    tags:
      - 'v*'   # runs for v1.0.0, v2.3.4, etc.

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

#      - name: Run tests
#        run: |
#          npm install
#          npm test
#
#      - name: Build
#        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
